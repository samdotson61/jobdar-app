  followup_stop: "{person} already got the one follow-up — that thread is closed. No exceptions; silence is an answer."
  followup_no_contact: "No first contact logged for {person} on this role — log the contact first with --log."
  followup_too_soon: "Too soon for {person} — {elapsed} of {needed} business days. Patience reads as professionalism (--force if they replied and invited it)."
  due_none: "No follow-ups due — nothing ripe and nothing pending."
  due_line: "{person} ({company}) — {days} business days since contact. One polite follow-up is ripe."
  closed_line: "{person} ({company}) — follow-up sent; thread closed."
  list_empty: "No outreach logged yet — `jobdar outreach <url>` finds people for a role."
  lint_ok: "Draft passes ({channel}). Read it aloud once, then send it yourself."
  lint_empty: "Draft is empty."
  lint_too_long: "Too long for a LinkedIn note: {length} chars (max {max}). Cut to one hook, one fit, one ask."
  lint_placeholder: "Leftover template placeholder: {quote}"
  lint_missing_name: "The recipient's name ({person}) never appears — a note without their name reads as a blast."

