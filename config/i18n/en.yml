# Jobdar — American English display strings (canonical).
# Every user-facing literal lives here, never hardcoded in code (Phase 1.3).
# config/i18n/es.yml must mirror this key set exactly (enforced by test-all.mjs).

cli:
  tagline: "Bilingual US job-search command center — built for new grads and first-time job-seekers."
  usage: "Usage: jobdar <command> [options]"
  commands_header: "Commands"
  options_header: "Options"
  command_desc:
    init: "Interactive setup wizard (region, level, profile, language)"
    scan: "Scan configured career portals for new roles (no model needed)"
    seed: "Materialize portals from the region employer catalog"
    eval: "Evaluate a role against your résumé — fit score + report"
    pipeline: "Run scan, evaluate, and track end to end"
    pdf: "Generate a tailored ATS CV / cover letter"
    tracker: "View and update your application tracker"
    dashboard: "Launch the pipeline dashboard"
    doctor: "Check that your setup is ready"
    update: "Update Jobdar to the latest version"
  opt_help: "Show help"
  opt_version: "Show version"
  opt_lang: "Language for this run (en | es)"
  more_help: "Run `jobdar <command> --help` for details on a command."
  planned: "`jobdar {command}` isn't built yet — it's planned for {phase}."
  unknown: "Unknown command: {command}. Run `jobdar --help` to see what's available."

scan:
  title: "Jobdar scan"
  dry_run_title: "Jobdar scan — dry run"
  ctx: "Region: {region}  ·  Level(s): {levels}  ·  Language: {language}"
  portals_count: "Portals configured: {count}"
  none: "No portals configured yet. Add entries to config/portals.yml, or run `jobdar init`."
  would_scan: "would scan"
  no_provider: "no matching provider (check careers_url)"
  dry_note: "Dry run — no network requests were made."
  scanning: "Scanning {count} portal(s)…"
  found_for: "{company}: {count} role(s)"
  error_for: "{company}: {error}"
  total_found: "{count} role(s) found across {portals} portal(s)."
  level_note: "{count} role(s) outside your level(s) were filtered out"
  region_note: "{count} role(s) outside your region(s) were filtered out"

doctor:
  title: "Jobdar doctor"
  node_ok: "Node.js {version}"
  node_old: "Node.js {version} — Jobdar needs >= {min}"
  deps_ok: "Dependencies installed"
  deps_missing: "Dependencies missing — run `npm install`"
  config_ok: "Config found (profile.yml + portals.yml)"
  config_missing: "{file} not found — run `jobdar init` to create it"
  i18n_ok: "Language tables present: {langs}"
  i18n_missing: "Language table missing: {lang}"
  providers_ok: "Scanner providers loaded: {providers}"
  pdf_optional: "PDF export not set up (optional — only needed for `jobdar pdf`)"
  playwright_optional: "Playwright not installed (optional — only some JS-heavy iCIMS sites need it)"
  summary_ok: "All good — you're ready to scan."
  summary_warn: "{count} optional item(s) not set up. You can still scan, evaluate, and track."
  summary_fail: "{count} problem(s) found. Fix the items marked with an x above, then re-run `jobdar doctor`."

tracker:
  title: "Application tracker"
  empty: "No applications tracked yet. Run `jobdar pipeline`, or add entries once tracking lands (Phase 6)."
  count: "{count} application(s) tracked"
  col_company: "Company"
  col_role: "Role"
  col_state: "State"
  col_updated: "Updated"

regions:
  midwest: "Midwest"
  northeast: "Northeast"
  southeast: "Southeast"
  southwest: "Southwest"
  west: "West"
  nationwide: "Nationwide"
  custom: "Custom"

levels:
  entry: "entry"
  mid: "mid"
  senior: "senior"

seed:
  title: "Region employer seeds"
  matched: "{count} employer(s) for: {regions}"
  none: "No seeded employers for that selection yet."
  written: "Wrote {count} employer(s) to {file}"
  hint: "Re-run with --write to save these to config/portals.yml"

init:
  title: "Jobdar setup"
  intro: "A few quick questions — then Jobdar writes your config and you can scan. Press Enter for a default."
  q_language: "Language / Idioma:"
  q_name: "Your name:"
  q_location: "Your metro (e.g. Indianapolis, IN):"
  q_region: "Which region should Jobdar focus on?"
  q_levels: "Which level of roles?"
  lvl_entry: "Entry-level only (default)"
  lvl_entry_mid: "Entry + mid-level"
  lvl_all: "Entry + mid + senior"
  q_tuning: "Which best describes you?"
  tun_new_grad: "New grad (default)"
  tun_early_career: "Early career (1–3 years)"
  tun_no_degree: "No degree / skills-based"
  tun_career_changer: "Career changer"
  q_inference: "How should Jobdar evaluate roles?"
  inf_api: "My own API key (cloud, higher quality) — default"
  inf_local: "On-device model (private; arrives in Phase 8)"
  q_api_key: "Paste your API key (or leave blank — model-backed commands use your AI CLI today):"
  key_saved: "Saved your key to {file} (gitignored). It powers eval/tailoring from Phase 8; today those run via your AI CLI."
  key_skipped: "No key stored — that's fine. Eval/tailoring run via your AI CLI; add a key later if you want."
  done: "Wrote {profile} and seeded {portals} employer(s) into config/portals.yml."
  seeded_none: "Wrote {profile}. No seeded employers for that region yet — add some to config/portals.yml or try --region nationwide."
  next: "Next: run `jobdar scan` to see roles, then `jobdar eval <url>` to score one."
  resume_saved: "Saved your résumé to {file} and prefilled your profile."
  resume_manual: "{file} looks like a {kind} — open it in your AI CLI (the onboard mode reads it) to build cv.md."

dashboard:
  title: "Jobdar dashboard"
  region: "Region"
  level: "Level(s)"
  language: "Language"
  tracker: "Application tracker"
  portals: "Portals"
  serving: "Dashboard running at {url} — open it in your browser."
  stop: "Press Ctrl-C to stop."
  footer: "Your data stays local. Jobdar reads only public job listings."

common:
  none: "none"
