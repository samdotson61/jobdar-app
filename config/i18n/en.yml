# Jobdar — American English display strings (canonical).
# Every user-facing literal lives here, never hardcoded in code (Phase 1.3).
# config/i18n/es.yml must mirror this key set exactly (enforced by test-all.mjs).

cli:
  tagline: "Bilingual US job-search command center — built for new grads and first-time job-seekers."
  usage: "Usage: jobdar <command> [options]"
  commands_header: "Commands"
  options_header: "Options"
  command_desc:
    init: "Interactive setup wizard (region, level, profile, language)"
    scan: "Scan configured career portals for new roles (no model needed)"
    seed: "Materialize portals from the region employer catalog"
    prescreen: "Gate + rank pending roles by likelihood before any eval (no model needed)"
    eval: "Evaluate a role against your résumé — fit score + report"
    pipeline: "Run scan, evaluate, and track end to end"
    pdf: "Render a tailored ATS résumé → output/ (HTML/PDF)"
    outreach: "Find people to contact about a role + keep follow-ups polite (drafts stay yours to send)"
    tracker: "View and update your application tracker"
    dashboard: "Launch the pipeline dashboard (web)"
    tui: "Interactive terminal dashboard"
    doctor: "Check that your setup is ready"
    update: "Update Jobdar to the latest version"
  opt_help: "Show help"
  opt_version: "Show version"
  opt_lang: "Language for this run (en | es)"
  more_help: "Run `jobdar <command> --help` for details on a command."
  planned: "`jobdar {command}` isn't built yet — it's planned for {phase}."
  unknown: "Unknown command: {command}. Run `jobdar --help` to see what's available."

scan:
  title: "Jobdar scan"
  dry_run_title: "Jobdar scan — dry run"
  ctx: "Region: {region}  ·  Level(s): {levels}  ·  Language: {language}"
  portals_count: "Portals configured: {count}"
  none: "No portals configured yet. Add entries to config/portals.yml, or run `jobdar init`."
  would_scan: "would scan"
  no_provider: "no matching provider (check careers_url)"
  dry_note: "Dry run — no network requests were made."
  scanning: "Scanning {count} portal(s)…"
  found_for: "{company}: {count} role(s)"
  error_for: "{company}: {error}"
  total_found: "{count} role(s) found across {portals} portal(s)."
  level_note: "{count} role(s) outside your level(s) were filtered out"
  region_note: "{count} role(s) outside your region(s) were filtered out"
  eval_hint: "Discovered roles saved to your pipeline. Scan only finds roles — run `jobdar eval <url>` to score fit (the model scores, not the scanner)."
  pruned: "{count} stale role(s) pruned (no longer listed on any board)"

doctor:
  title: "Jobdar doctor"
  node_ok: "Node.js {version}"
  node_old: "Node.js {version} — Jobdar needs >= {min}"
  deps_ok: "Dependencies installed"
  deps_missing: "Dependencies missing — run `npm install`"
  home: "User data home: {home}  (set JOBDAR_HOME to relocate; copy that folder to move devices)"
  config_ok: "Config found (profile.yml + portals.yml)"
  config_missing: "{file} not found — run `jobdar init` to create it"
  i18n_ok: "Language tables present: {langs}"
  i18n_missing: "Language table missing: {lang}"
  providers_ok: "Scanner providers loaded: {providers}"
  pdf_optional: "PDF export not set up (optional — only needed for `jobdar pdf`)"
  playwright_optional: "Playwright not installed (optional — only some JS-heavy iCIMS sites need it)"
  summary_ok: "All good — you're ready to scan."
  summary_warn: "{count} optional item(s) not set up. You can still scan, evaluate, and track."
  summary_fail: "{count} problem(s) found. Fix the items marked with an x above, then re-run `jobdar doctor`."

tracker:
  title: "Application tracker"
  empty: "No applications tracked yet — press `a` on a role in `jobdar tui`, or run `jobdar tracker --set <url> applied`."
  count: "{count} application(s) tracked"
  set_usage: "Usage: jobdar tracker --set <url> <state>   (states: {states})"
  set_missing: "No pipeline role with that URL — run `jobdar scan` first ({url})"
  set_done: "Marked {state} — {url}"
  col_company: "Company"
  col_role: "Role"
  col_state: "State"
  col_updated: "Updated"

regions:
  midwest: "Midwest"
  northeast: "Northeast"
  southeast: "Southeast"
  southwest: "Southwest"
  west: "West"
  nationwide: "Nationwide"
  custom: "Custom"

levels:
  entry: "entry"
  mid: "mid"
  senior: "senior"

seed:
  title: "Region employer seeds"
  matched: "{count} employer(s) for: {regions}"
  none: "No seeded employers for that selection yet."
  written: "Wrote {count} employer(s) to {file}"
  hint: "Re-run with --write to save these to config/portals.yml"

init:
  title: "Jobdar setup"
  intro: "A few quick questions — then Jobdar writes your config and you can scan. Press Enter for a default."
  q_language: "Language / Idioma:"
  q_name: "Your name:"
  q_location: "Your metro (e.g. Indianapolis, IN):"
  q_salary: "Target annual salary in USD (or blank to skip):"
  q_region: "Which region should Jobdar focus on?"
  q_levels: "Which level of roles?"
  lvl_entry: "Entry-level only (default)"
  lvl_entry_mid: "Entry + mid-level"
  lvl_all: "Entry + mid + senior"
  q_tuning: "Which best describes you?"
  tun_new_grad: "New grad (default)"
  tun_early_career: "Early career (1–3 years)"
  tun_no_degree: "No degree / skills-based"
  tun_career_changer: "Career changer"
  q_inference: "How should Jobdar evaluate roles?"
  inf_api: "My own API key (cloud, higher quality) — default"
  inf_local: "On-device model (private; arrives in Phase 8)"
  q_api_key: "Paste your API key (or leave blank — model-backed commands use your AI CLI today):"
  key_saved: "Saved your key to {file} (gitignored). It powers eval/tailoring from Phase 8; today those run via your AI CLI."
  key_skipped: "No key stored — that's fine. Eval/tailoring run via your AI CLI; add a key later if you want."
  done: "Wrote {profile} and seeded {portals} employer(s) into config/portals.yml."
  seeded_none: "Wrote {profile}. No seeded employers for that region yet — add some to config/portals.yml or try --region nationwide."
  next: "Next: run `jobdar scan` to see roles, then `jobdar eval <url>` to score one."
  resume_saved: "Saved your résumé to {file} and prefilled your profile."
  resume_manual: "{file} looks like a {kind} — open it in your AI CLI (the onboard mode reads it) to build cv.md."

dashboard:
  title: "Jobdar dashboard"
  region: "Region"
  level: "Level(s)"
  language: "Language"
  tracker: "Application tracker"
  portals: "Portals"
  serving: "Dashboard running at {url} — open it in your browser."
  stop: "Press Ctrl-C to stop."
  footer: "Your data stays local. Jobdar reads only public job listings."
  access: "Open your dashboard — `jobdar tui` (terminal) or `jobdar dashboard` (web · http://localhost:4319)"
  analytics: "Analytics"
  pipeline: "Pipeline"
  all: "All"
  no_eval: "No evaluated roles yet — run `jobdar eval <url>` to score some."
  stat_summary: "{evaluated} of {total} roles evaluated · avg fit {avg}"
  chart_bands: "By band"
  chart_scores: "Score distribution"
  chart_companies: "Top companies"
  chart_sectors: "By sector"
  chart_locations: "By location"
  chart_funnel: "Pipeline funnel"
  funnel_discovered: "Discovered"
  funnel_evaluated: "Evaluated"
  funnel_applytier: "Apply-tier"
  funnel_applied: "Applied"

tui:
  keys: "↑/↓ move · ⏎/o open · a applied · PgUp/PgDn g/G jump · s sort · 1/2/3 band · p pending · 0 all · c company · r refresh · q quit"
  empty: "No roles yet — run `jobdar scan` to discover roles, then `jobdar eval <url>` to score them."
  none_match: "No roles match this filter."
  pending: "pending"
  position: "{from}–{to} of {total}"
  col_score: "Score"
  col_band: "Band"
  col_role: "Role"
  col_company: "Company"
  col_location: "Location"
  by_score: "score"
  by_company: "company"
  by_band: "band"
  sorted: "sorted by {mode}"

bands:
  apply: "Apply"
  research: "Research"
  dont: "Don't"

eval:
  title: "Evaluate a role"
  next_for: "Next pending: {role} @ {company} ({remaining} pending)"
  next_none: "Nothing pending — every discovered role is evaluated. Run `jobdar scan` for fresh roles."
  next_screened_hint: "{count} role(s) are screened out by prescreen — re-run with --include-screened to see them anyway."
  next_screened_note: "prescreen screened this role — {reason}"
  jd_for: "Job description — {role} (fetched for you; score it against your résumé):"
  today: "Today's date is {date} — treat any “Present”/“Current” on the résumé as this date, never as a future date."
  jd_none: "Couldn't fetch the JD automatically — open {url} to read it, then score."
  jd_error: "Couldn't fetch the JD ({error}) — open the URL to read it, then score."
  model_needed: "Evaluation is model-backed — run `/jobdar eval <url>` in your AI CLI. It reads modes/eval.md, scores fit against your résumé, and records the verdict."
  save_hint: "It saves with: jobdar eval --save --url <url> --score <0.0–5.0> --band <apply|research|dont> --company \"…\" --role \"…\" --note \"…\""
  save_usage: "Usage: jobdar eval --save --url <url> --score <0.0–5.0> [--band apply|research|dont] [--company …] [--role …] [--note …]"
  saved: "Saved fit {score} ({band}) — {role}"

pdf:
  title: "Build résumé"
  no_cv: "No résumé yet. Add one with `jobdar init --resume <file>` (or paste it via the onboard mode)."
  html_written: "Wrote {file}"
  pdf_written: "Wrote {file}"
  no_playwright: "HTML written. For an automatic PDF run `npm i playwright`, or open the HTML and Print → Save as PDF."

prescreen:
  title: "Prescreen — gate + rank before eval"
  no_cv: "No résumé (cv.md) yet — skill overlap will read neutral. Add one with `jobdar init --resume <file>`."
  none: "Nothing to prescreen — no pending roles without a prescreen score. Use --rescore to redo all pending."
  checking: "Checking {count} pending role(s) — fetching each JD politely…"
  ranked_header: "Eval queue, most winnable first ({count}):"
  screened_header: "Screened out — each with its reason, nothing hidden ({count}):"
  override_hint: "Still want one? `jobdar eval --next --include-screened`, or `jobdar eval <url>` directly."
  done: "Prescreen done: {ranked} ranked, {screened} screened. `jobdar eval --next` now serves the best role first."
  jd_unavailable: "JD unavailable — scored on freshness only"
  reason_years: "asks for more experience than your level"
  reason_clearance: "requires an active security clearance"
  reason_degree: "degree-gated (you excluded degree-required roles)"
  flag_clearance: "clearance mentioned"
  flag_degree_stretch: "degree asked — worth a shot anyway"
  flag_sponsorship: "no visa sponsorship"
  flag_license: "license/cert required"

outreach:
  title: "Outreach — a warm contact beats a cold application"
  usage: "Usage: jobdar outreach <url|company> · --log/--followup --url <u> --person \"Name\" · --due · --lint <file|-> · --list"
  for_role: "{role} @ {company}"
  link_recruiters: "Recruiters & talent acquisition (you browse, you choose):"
  link_hiring_manager: "Likely hiring managers:"
  link_company_people: "Everyone at the company:"
  cadence_state: "Contacts for this role: {used} of {max} (the cap keeps it polite)"
  privacy_note: "Privacy: Jobdar never scrapes LinkedIn or sends messages. Paste a person's public headline into the outreach mode for a tailored draft — the paste is used for that draft and never stored."
  next_steps: "Sent something? Log it: `jobdar outreach --log --url <roleUrl> --person \"Name\"` — then `jobdar outreach --due` tells you when the one polite follow-up is ripe."
  log_usage: "Usage: jobdar outreach --log|--followup --url <roleUrl> --person \"Full Name\" [--title …] [--channel linkedin|email] [--note …]"
  contact_logged: "Logged contact: {person} ({company}). Good luck!"
  contact_duplicate: "You already contacted {person} about this role — one thread per person. `--due` shows when the follow-up is ripe."
  contact_cap: "This role already has {max} contact(s) — more reads as pestering the company. Pick a different role or wait for replies."
  followup_logged: "Logged the follow-up to {person} ({company}). That thread is now closed — no more messages to them about this role."
  followup_reminder: "One polite follow-up is ripe after {days} business days — `jobdar outreach --due` will tell you."
  followup_stop: "{person} already got the one follow-up — that thread is closed. No exceptions; silence is an answer."
  followup_no_contact: "No first contact logged for {person} on this role — log the contact first with --log."
  followup_too_soon: "Too soon for {person} — {elapsed} of {needed} business days. Patience reads as professionalism (--force if they replied and invited it)."
  due_none: "No follow-ups due — nothing ripe and nothing pending."
  due_line: "{person} ({company}) — {days} business days since contact. One polite follow-up is ripe."
  closed_line: "{person} ({company}) — follow-up sent; thread closed."
  list_empty: "No outreach logged yet — `jobdar outreach <url>` finds people for a role."
  lint_ok: "Draft passes ({channel}). Read it aloud once, then send it yourself."
  lint_empty: "Draft is empty."
  lint_too_long: "Too long for a LinkedIn note: {length} chars (max {max}). Cut to one hook, one fit, one ask."
  lint_placeholder: "Leftover template placeholder: {quote}"
  lint_missing_name: "The recipient's name ({person}) never appears — a note without their name reads as a blast."

common:
  none: "none"
