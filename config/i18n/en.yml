  cadence_state: "Contacts for this role: {used} of {max} (the cap keeps it polite)"
  privacy_note: "Privacy: Jobdar never scrapes LinkedIn or sends messages. Paste a person's public headline into the outreach mode for a tailored draft — the paste is used for that draft and never stored."
