outreach:
  title: "Outreach — a warm contact beats a cold application"
  usage: "Usage: jobdar outreach <url|company> · --log/--followup --url <u> --person \"Name\" · --due · --lint <file|-> · --list"
  for_role: "{role} @ {company}"
