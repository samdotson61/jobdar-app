  providers_ok: "Proveedores del escáner cargados: {providers}"
  pdf_optional: "Exportación a PDF no configurada (opcional — solo para `jobdar pdf`)"
  playwright_optional: "Playwright no instalado (opcional — solo algunos sitios iCIMS con mucho JS lo necesitan)"
  summary_ok: "Todo en orden — listo para escanear."
  summary_warn: "{count} elemento(s) opcional(es) sin configurar. Puedes escanear, evaluar y registrar igualmente."
  summary_fail: "{count} problema(s) encontrado(s). Corrige los elementos marcados con una x arriba y vuelve a ejecutar `jobdar doctor`."

