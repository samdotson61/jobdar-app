    seed: "Materializa portales desde el catálogo de empleadores por región"
    eval: "Evalúa un puesto frente a tu currículum — puntuación de ajuste + informe"
    pipeline: "Ejecuta escanear, evaluar y registrar de principio a fin"
    pdf: "Genera un currículum ATS → output/ (HTML/PDF)"
    tracker: "Consulta y actualiza tu registro de solicitudes"
    dashboard: "Abre el panel del flujo de trabajo (web)"
    tui: "Panel interactivo en la terminal"
    doctor: "Verifica que tu configuración esté lista"
    update: "Actualiza Jobdar a la última versión"
  opt_help: "Muestra la ayuda"
  opt_version: "Muestra la versión"
  opt_lang: "Idioma para esta ejecución (en | es)"
  more_help: "Ejecuta `jobdar <comando> --help` para ver los detalles de un comando."
  planned: "`jobdar {command}` aún no está disponible — está planificado para {phase}."
  unknown: "Comando desconocido: {command}. Ejecuta `jobdar --help` para ver las opciones."

