# Jobdar — cadenas en español (paridad completa con en.yml).
# Todo texto visible para el usuario vive aquí, nunca incrustado en el código.
# El conjunto de claves debe coincidir exactamente con en.yml (lo verifica test-all.mjs).

cli:
  tagline: "Centro de búsqueda de empleo bilingüe — para recién graduados y quienes buscan su primer trabajo."
  usage: "Uso: jobdar <comando> [opciones]"
  commands_header: "Comandos"
  options_header: "Opciones"
  command_desc:
    init: "Asistente de configuración interactivo (región, nivel, perfil, idioma)"
