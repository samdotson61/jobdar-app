# Jobdar profile — EXAMPLE. Copy to config/profile.yml (or just run `jobdar init`, which writes it
# for you). config/profile.yml is GITIGNORED: it holds your name, metro, and salary target — personal
# data that must never reach a repo or npm package.
language: en            # en | es
target_regions:         # midwest | northeast | southeast | southwest | west | nationwide | custom
  - midwest
target_levels:          # entry (default) | mid | senior (opt-in, ranks on merit)
  - entry
tuning_profile: new_grad   # new_grad | early_career | no_degree | career_changer
inference: local        # local (on-device — default, private, no key) | api (BYO key) | auto
inference_runtime: winc # local runtime: winc (default) | ollama | llamafile (OpenAI-compat)
inference_url: ""       # blank → the runtime's localhost default (winc 127.0.0.1:8080); point it at the server matching inference_runtime
local_model: ""         # model id for ollama/llamafile; winc --eval auto-picks, so leave blank for winc
name: ""                # your name — stays local
location: ""            # your metro, e.g. "Indianapolis, IN" — stays local
include_degree_required_roles: true
target_salary: 0        # annual USD target (0 = unset) — stays local
